notes: |
  Skill operacional de MANUTENÇÃO PROATIVA. Detecta drift de contexto e
  sinaliza sugestão específica + acionável.

  Nunca age destrutivamente — apenas propõe. Quando aprovado, gera
  prompt padrão pra extensão Claude Chrome alimentar NotebookLM.

  Após retorno da extensão (próxima sessão), aplica anti-verbatim PASS
  + mapeamento iterativo (NOVO/CONFIRMA/REFINA aplica; ALTERA/DESCARTA
  pergunta) + atualiza header + versão bumpa + audit_log.

  4 triggers de detecção: data >90d, contradição com input usuário,
  lacuna em consulta NotebookLM, eixo importante sem notebook vinculado.
