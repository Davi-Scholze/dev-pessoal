name: proposta-cliente
type: skill-universal
version: 0.1.0-draft
status: DRAFT
created: 2026-05-21
updated: 2026-05-21
eixo: orchestration
escopo: global
sensibilidade: confidencial-cliente

description: >
  Workflow orquestrador de 6 fases pra gerar proposta consultiva TOP pra cliente novo
  (modelo DFY/DWY/DIY). Captura material recebido (prints, URLs, audios) -> mapeia
  estado atual do cliente -> pesquisa o melhor da categoria (concorrentes + benchmarks)
  -> gera proposta TOP com escopo + ticket + entregaveis. Orquestra /capturar-imagem +
  /absorver-contexto + /mapear-concorrente + /sugerir-pesquisa + /pedir-contexto. Output:
  arquivo propostas/<cliente>-<data>.md pronto pra exportar PDF.

triggers:
  - "/proposta-cliente <nome>"
  - "Preparar proposta pra X"
  - "Vamos atender cliente Y"
  - "Material desse cliente: ..." (com URLs/prints adjacentes)
  - Operador cola URLs+prints com tom 'atendimento cliente novo'

applies_to:
  - Agencia/freelancer que vende sistemas/automacao/consultoria
  - Operador em modelo de venda consultiva (DFY/DWY/DIY)
  - SaaS com plano Enterprise (venda consultiva pra ticket alto)
  - Profissional autonomo que precisa formalizar proposta tecnica

not_applicable:
  - Cliente ja existente (use /atualizar-projeto ou /update-proposta)
  - Discussao tecnica nao-comercial (escolha de stack, decisao arquitetural)
  - Pesquisa de mercado sem cliente especifico (use /sugerir-pesquisa direto)
  - Operador puramente SaaS self-service (proposta nao se aplica)

