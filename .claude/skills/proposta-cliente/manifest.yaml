proxima_promocao: |
  DRAFT -> FUNCIONAL quando aplicada em >=2 propostas reais validadas:
  - 1 proposta enviada a cliente real com material curado
  - 1 conversao (fechamento) ou >=1 sessao de revisao consultiva
  - Operador valida qualidade do output (5 elementos canonicos + estado-arte + gaps + proposta + executive summary)

  FUNCIONAL -> BATTLE-TESTED quando >=5 propostas geradas em >=2 projetos consumidores
  diferentes, com taxa de conversao >25% e ticket medio dentro do esperado.
