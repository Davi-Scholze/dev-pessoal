triggers:
  - bug reportado, teste falhando, comportamento inesperado, perf, build
    quebrado, integração quebrada
  - ANTES de propor fix
  - especialmente em emergência ('fix rápido' tentador)
  - quando fix anterior não resolveu
  - quando IA já tentou 2+ fixes sem sucesso (gate da Fase 4.5)
authors:
  - Anthropic Superpowers (fonte)
  - KOD.AI 2026-05-20 (re-implementação universalizada)
notes: |
  Bundle Tier 3.5. Iron Law: 'sem fix sem investigar root cause'.
  Espelha verification-before-completion (Iron Law similar, escopo
  diferente — uma é debug, outra é claim de conclusão).

  4 fases sequenciais sem pular:
  1. Root Cause Investigation (multi-camada quando necessário)
  2. Pattern Analysis (comparar com working examples)
  3. Hipótese (uma de cada vez, teste mínimo)
  4. Implementação (teste falha → fix → verificar)

  Gate crítico: se 3+ fixes falharam, PARA e questiona arquitetura.
  Não tenta o 4º. Fala com decisor humano antes.

  Sub-arquivos auxiliares da fonte (root-cause-tracing,
  defense-in-depth, condition-based-waiting) — princípios absorvidos
  ao texto, não bundled separadamente.
related:
  - test-driven-development
  - verification-before-completion
  - code-review
  - escuta-antes-de-agir
  - explicar-acao-custosa
  - regras-base (10, 12)
