proxima_promocao: |
  DRAFT -> FUNCIONAL quando aplicada em >=2 concorrentes reais com Evidence Bloc:
  - 2 concorrentes diferentes mapeados
  - Pelo menos 1 lacuna defensavel proposta foi efetivamente implementada
  - Operador validou que reporte foi acionavel (nao gerou ruido)

  FUNCIONAL -> BATTLE-TESTED quando >=5 concorrentes mapeados em >=2 projetos consumidores
  diferentes, com pelo menos 3 implementacoes concretas derivadas.
