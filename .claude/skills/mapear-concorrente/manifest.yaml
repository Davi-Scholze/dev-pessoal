name: mapear-concorrente
type: skill-universal
version: 0.2.0
status: FUNCIONAL
created: 2026-05-21
updated: 2026-05-21
promoted_to_functional_at: 2026-05-21
promoted_evidence: |
  Promovida DRAFT -> FUNCIONAL apos 2 execucoes end-to-end validadas:
  1. FaceDojo (Zedscript, BR) — conceito facedojo-vs-meudojo.md (commit 2d5c170)
  2. Next Fit (enterprise fitness BR) — conceito nextfit-vs-meudojo.md (este commit)
  Ambos com matriz comparativa, lacunas defensaveis, plano implementacao
  priorizado por ROI, decisoes pendentes com recomendacao, anti-pollution
  PASS, commit + push upstream. Critério de promocao atingido conforme
  proxima_promocao declarada (>=2 concorrentes diferentes mapeados).
eixo: orchestration
escopo: global
sensibilidade: publico

description: >
  Investiga concorrente direto do produto-ancora em workflow de 5 fases
  (investigar -> matriz comparativa -> propor implementacao dos gaps ->
  garantir superioridade defensavel -> registrar como conceito em
  competitive-intelligence). Operacionaliza padrao operacional do operador:
  todo concorrente enviado dispara investigacao automatica + matriz +
  plano de implementacao. Sem copiar verbatim, com gate humano em
  decisoes criticas.

triggers:
  - "/mapear-concorrente <url-ou-nome>"
  - "Mapear concorrente X"
  - "Analisa esse concorrente: <url>"
  - "Como nos diferenciamos de X?"
  - "Esse aqui faz o que a gente faz?" (apos colar URL)
  - Auto-disparo ao detectar URL de Instagram/YouTube/site/marketplace com tom "olha esse aqui"

applies_to:
  - Qualquer projeto consumidor com produto-ancora identificavel + concorrentes diretos
  - Vertical com benchmark publico (SaaS B2B, B2C, marketplace, plataforma vertical)
  - Pasta-mae com KODAI instalado + contexto-dominio do vertical

not_applicable:
  - Pesquisa neutra de mercado (use /sugerir-pesquisa)
  - Pesquisa de tecnologia/framework (use Context7 ou WebFetch direto)
  - Concorrente sem presenca publica (sem URL/listing/marca)
  - Re-mapeamento <30 dias (use --update explicito)

