      type: incidente-operacional-curado
      anti_pollution_passed: true
      date: 2026-05-21
    - source: "Texto literal do operador 2026-05-21 sessao 4: 'em tempo real a IA possa ir espelhando tudo isso em contexto, de forma que a gente nao perca contextos, saiba que esse descartamos, esse melhoramos, esse esta funcionando'"
      type: doc-pareado-curado
