related:
  - SKILL.md (workflow 4 fases + 8 status canonicos + 3 casos de uso + modos --listar/--diff/--grafo)
  - "../espelhar/SKILL.md (consumidor — reflete mudancas de status)"
  - "../pedir-contexto/SKILL.md (skill irma)"
  - "../proposta-cliente/SKILL.md (consumidor — FUNCIONAL como credibilidade na proposta)"
  - "../../regras-base.md (regra-base 5 — STUB|DRAFT|FUNCIONAL|BATTLE-TESTED|PARKED extendido)"

evidence_bloc_status: aguardando-primeiro-uso-pratico

proxima_promocao: |
  DRAFT -> FUNCIONAL quando aplicada em >=5 transicoes reais validadas:
  - >=2 skills promovidas DRAFT -> FUNCIONAL via /status-decisao
  - >=1 feature marcada wontfix com motivo registrado
  - >=1 conceito refatorado (transicao com link pra substituto)
  - >=1 pendencia marcada resolvida via auto-detecto (checkmark em PENDENCIAS)
  + operador valida que historico nao foi corrompido e cross-refs estao consistentes

  FUNCIONAL -> BATTLE-TESTED quando >=20 transicoes em >=2 projetos consumidores diferentes,
  zero perdas de historico, e operador usa --grafo regularmente pra navegar decisoes.
