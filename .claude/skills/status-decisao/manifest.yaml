name: status-decisao
type: skill-universal
version: 0.1.0-draft
status: DRAFT
created: 2026-05-21
updated: 2026-05-21
eixo: orchestration
escopo: global
sensibilidade: publico

description: >
  Marca decisoes/features/specs/conceitos com tag semantica de status do ciclo de vida
  (8 canonicos: rascunho/em-progresso/bloqueado/funcionando/refatorado/parqueado/wontfix/descartado)
  e mantem grafo de transicao (quando mudou + porque + decidido_por). Aplica em ADRs,
  PENDENCIAS.md, manifests de skills/contextos/packs, conceitos. Cross-ref automatico.
  Historico NUNCA apagado — auditavel pra sempre.

triggers:
  - "/status-decisao <item> <status>"
  - "Marca X como funcionando"
  - "Esse Y descartamos"
  - "Esse plano foi refatorado"
  - "Esse pack parqueamos"
  - "Esse status mudou pra X"
  - Auto-promote quando Evidence Bloc validado em manifest
  - Auto-marca quando pendencia marcada com checkmark em PENDENCIAS.md

applies_to:
  - Qualquer projeto consumidor com KOD.AI instalado
  - Skills/contextos/packs com lifecycle (DRAFT -> FUNCIONAL -> BATTLE-TESTED)
  - Specs/ADRs em docs/decisoes/
  - Features do produto-ancora (catalogo modular MeuDojo, por ex)
  - Pendencias com resolucao ou descarte

not_applicable:
  - Status implicito nao-confirmado (operador disse "acho que tá ok" — nao eh confirmacao)
  - Mudanca trivial entre estados consecutivos (idempotencia)
  - Conceito sem estrutura de manifest (texto livre puro)

