notes: |
  Skill operacional de GAP-DETECTION REATIVO. Detecta durante interação
  quando a pergunta do usuário não pode ser respondida com contextos
  atuais — sinaliza lacuna + sugere ação específica.

  Princípio: HONESTIDADE ABSOLUTA. Não inventa, não alucina, não responde
  por baixo. Combina Iron Law (verification-before-completion) com
  política respostas-com-referencias (anti-alucinação).

  Diferença vs /evoluir-contexto: reativa (em tempo real) vs proativa
  (drift). Ambas convergem no prompt da extensão Claude Chrome quando
  aprovadas.

  Output padrão 5 linhas (Lacuna detectada / Cobertura atual / Falta /
  Sugestão / pergunta sobre prompt da extensão).
