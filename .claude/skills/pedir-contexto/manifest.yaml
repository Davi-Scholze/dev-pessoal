proxima_promocao: |
  DRAFT -> FUNCIONAL quando aplicada em >=3 situacoes reais distintas:
  - 1 caso de WebFetch falhando (ex: proximo concorrente OnMat/Kimono — operador prove
    NotebookLM ou material manual via skill)
  - 1 caso de pre-flight de skill identificar input ausente (ex: /proposta-cliente sem material)
  - 1 caso de gap detectado durante implementacao (ex: hex exato de paleta faltando)
  + operador valida que pedido foi claro e nao gerou ruido

  FUNCIONAL -> BATTLE-TESTED quando >=10 usos em >=2 projetos consumidores diferentes
  com taxa de resposta do operador >70% (skill nao vira fonte de ruido).
