name: pedir-contexto
type: skill-universal
version: 0.1.0-draft
status: DRAFT
created: 2026-05-21
updated: 2026-05-21
eixo: orchestration
escopo: global
sensibilidade: publico

description: >
  Detecta gap de contexto (foto/print/link/video/audio/doc/credencial faltando) durante
  execucao de outra skill OU em conversa livre, e pede ATIVAMENTE ao operador o material
  necessario em formato especifico. Anti-padrao: ficar tentando alternativas silenciosamente
  OU inventar baseado em palpite. Sempre oferece 2-3 alternativas de como prover. Apos
  receber, dispara skill de absorcao apropriada automaticamente.

triggers:
  - "/pedir-contexto <tipo>"
  - "Pede ao Davi um print de X"
  - "Preciso de mais contexto sobre Y"
  - WebFetch falha consecutivamente (>=2 URLs)
  - Skill ativa pede input nao fornecido
  - Conceito sem fonte ancorada sendo criado
  - Pre-flight de outra skill identifica input ausente

applies_to:
  - Qualquer projeto consumidor com KOD.AI instalado
  - Skills que dependem de input externo (WebFetch, /mapear-concorrente, /proposta-cliente, /absorver-*)
  - Conversa livre quando operador pede analise sem enviar material
  - Pos-falha de tentativas automaticas (WebFetch ECONNREFUSED / 404 / vazio)

not_applicable:
  - Gap resolvivel por codigo (ex: ler arquivo que ja existe na pasta)
  - Gap inferivel com risco controlado e marcado
  - Operador focado em outra coisa (use modo --silencioso)
  - Quando /sugerir-pesquisa cobre melhor (pesquisa web sem precisar do operador)

