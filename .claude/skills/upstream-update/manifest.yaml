  - status-tracker.md (formato canônico — task 03)
  - modelo-a.js (Modelo A direct push — task 04)
  - pre-push-check.js (hook integrado — task 04)
  - modelo-b.js (Modelo B fork+PR — task 06 stub futuro)
  - modelo-c.js (Modelo C gate-server — task 07 stub futuro)
dependencias:
