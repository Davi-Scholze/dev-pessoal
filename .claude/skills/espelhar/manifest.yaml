  reuso_esperado: muito-alto — qualquer projeto KOD.AI com sessoes longas se beneficia

authors:
  - name: Davi Scholze
    role: especificador
    notes: "Descreveu fluxo desejado em 2026-05-21 sessao 4 — 'em tempo real IA possa ir espelhando tudo isso em contexto, de forma que a gente nao perca contextos'. Skill operacionaliza esse pedido."

related:
