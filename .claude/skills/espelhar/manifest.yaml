evidence_bloc_status: aguardando-primeiro-uso-pratico

proxima_promocao: |
  DRAFT -> FUNCIONAL quando aplicada em >=3 sessoes reais com sucesso:
  - 1 fim-de-sessao significativa (>=5 tool uses + >=1 commit) com handoff atualizado
  - 1 apos criacao de skill/contexto/pack (espelhamento incremental)
  - 1 modo --dry-run validado pelo operador (diff aceito + aplicado)
  + operador valida que arquivos vivos refletem realidade da sessao

  FUNCIONAL -> BATTLE-TESTED quando >=10 execucoes em >=2 projetos consumidores
  diferentes, taxa de erro de categorizacao <10%, operador confia no resultado
  sem revisar manualmente cada vez.

  Roadmap futuro: virar hook PostToolUse 'intelligent' que detecta momentos-chave
  automaticamente e dispara espelhar sem precisar lembrar.
