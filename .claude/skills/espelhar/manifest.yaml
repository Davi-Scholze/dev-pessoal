name: espelhar
type: skill-universal
version: 0.1.0-draft
status: DRAFT
created: 2026-05-21
updated: 2026-05-21
eixo: orchestration
escopo: global
sensibilidade: publico

description: >
  Reflete mudancas efetivas da sessao (commits, arquivos novos, edits significativos, decisoes
  tomadas) nos arquivos vivos do projeto consumidor: PROMPT_MASTER_HANDOFF.md, PENDENCIAS.md,
  _negocio/MAPA.md, _memoria/*.md e memorias persistentes. Git como fonte de verdade — NUNCA
  inventa progresso. Sai do modo 'atualizo quando lembrar' — entra no modo 'espelhamento
  estruturado auditavel'.

triggers:
  - "/espelhar"
  - "Espelha o que fizemos"
  - "Atualiza memoria"
  - "Registra a sessao"
  - "Atualiza handoff/pendencias"
  - Final de sessao com >=5 tool uses + >=1 commit
  - Apos criacao de artefato significativo (skill/contexto/pack)
  - Apos resolucao de pendencia P0/P1
  - Apos mudanca de foco estrategico
  - Antes de operador fechar conversa (proxima Sessao Zero precisa contexto fresco)

applies_to:
  - Qualquer projeto consumidor com KOD.AI instalado
  - Sessoes longas com multiplas mudancas (5+ tool uses + commits)
  - Apos /mapear-concorrente, /absorver-contexto, /criar-skill, /criar-pack, etc
  - Final de sessao significativa

not_applicable:
  - Sessao com <5 tool uses + 0 commits (nada significativo)
  - Operador rodou /espelhar ha <30 turnos (idempotencia)
  - Operador focado em outra coisa e nao pediu (use --silencioso)
  - Operador pediu /atualizar (skill maior, escopo diferente)
  - Projeto consumidor sem git rastreando (sem fonte de verdade)

