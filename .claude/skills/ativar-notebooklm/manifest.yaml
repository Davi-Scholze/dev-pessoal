notes: |
  Skill operacional de intake — detecta URL de NotebookLM colada pelo
  usuário + contexto adjacente e vincula automaticamente à pasta correta
  da estrutura KOD.AI.

  Workflow 7 passos: detectar URL (regex) → identificar tema/eixo
  (heurísticas + 1 pergunta única se vago) → mapear pra pasta destino
  (6 cenários) → criar/atualizar notebooklm.url (idempotente, confirma
  antes de sobrescrever) → adicionar à library via notebook_manager.py
  → salvar bruto se .md anexado → confirmação padrão ao usuário.

  Combate sub-trigger (regra-base 4): auto-disparo por presença do link,
  não só por comando explícito.

  Skill formalizada após sessão 2026-05-20 onde Davi compartilhou 2
  NotebookLMs canônicos com contexto adjacente — comportamento esperado
  era ativação automática.
